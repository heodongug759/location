<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 상태 점검</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f8f9fa; }
        .btn { padding: 15px 30px; font-size: 18px; background-color: #ffc107; color: #212529; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⚠️ 링크 보안 취약점 테스트</h2>
    <p>아래 버튼을 눌러 접속 경로가 안전한지 확인하세요.</p>
    <button class="btn" onclick="checkLocation()">접속 경로 확인</button>

    <script>
    function checkLocation() {
        // 공공 IP 기반 위치 제공 API 사용 (서버 저장 없음, 무료 API)
        // ip-api.com은 사용자의 IP를 분석해 국가, 도시, 구 단위의 정보를 반환합니다.
        fetch('https://ip-api.com')
        .then(response => response.json())
        .then(data => {
            // API가 반환한 도시(city) 또는 지역 정보 추출
            const region = data.city || data.regionName || "알 수 없는 지역";
            const provider = data.isp || "알 수 없는 통신사";

            // 사용자 화면에 먼저 안내창 표시
            alert(`[테스트 통과]\n현재 접속 지역: ${region}\n통신사: ${provider}\n\n잠시 후 확인 문자가 생성됩니다.`);

            // 내 휴대폰 번호 세팅 (예: 010-1234-5678)
            const myPhoneNumber = "01012345678"; 
            
            // 문자 메시지 본문 구성 (URL 인코딩 처리)
            const smsBody = encodeURIComponent(
                `[보안 주의 경고]\n출처가 불분명한 링크 클릭으로 인해 대략적인 위치가 노출되었습니다.\n\n📍 예측 지역: ${region}\n🌐 통신망: ${provider}\n\n앞으로 장난 링크라도 함부로 누르지 마세요!`
            );

            // 안드로이드 및 아이폰 규격에 맞는 문자(SMS) 앱 실행 주소 설정
            // 사용자가 '전송' 버튼을 눌러야 나에게 문자가 도달합니다.
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // iOS 규격
                window.location.href = `sms:${myPhoneNumber}&body=${smsBody}`;
            } else {
                // 안드로이드 규격
                window.location.href = `sms:${myPhoneNumber}?body=${smsBody}`;
            }
        })
        .catch(error => {
            alert("네트워크 환경이 불안정하여 위치를 확인할 수 없습니다.");
        });
    }
    </script>

</body>
</html>
